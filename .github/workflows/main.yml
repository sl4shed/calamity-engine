name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Doxygen
        run: sudo apt-get install -y doxygen

      - name: Build docs
        run: doxygen Doxyfile

      - name: Install Emscripten
        uses: emscripten-core/setup-emsdk@v14
        with:
          version: latest

      - name: Build examples
        run: bash build-examples.sh --web-only

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 'latest'

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Install dependencies
        working-directory: website
        run: pnpm install

      - name: Run pre-build script
        working-directory: website
        run: node build.js

      - name: Build website
        working-directory: website
        run: pnpm build

      - name: Deploy main site
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy website/.output/public --project-name=calamity-website

      - name: Deploy docs
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs-out/html --project-name=calamity-docs